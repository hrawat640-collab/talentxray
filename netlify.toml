# Static frontend on Netlify. Live search API runs on Render (see render.yaml).
# Set RENDER_API_URL in Netlify env vars (e.g. https://talentxray-api.onrender.com)
# before deploy — scripts/write-netlify-redirects.mjs bakes it into client/dist/_redirects.
[build]
  command = "npm install && npm run build"
  publish = "client/dist"
